<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're in — QUID</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Inter', sans-serif; background: #07060f; color: #fff;
      display: flex; align-items: center; justify-content: center; }
    .card {
      text-align: center; padding: 48px 40px; max-width: 420px; width: 100%;
      background: rgba(14,8,32,0.8); border: 1px solid rgba(150,100,255,0.2);
      border-radius: 28px; box-shadow: 0 0 80px rgba(100,40,220,0.2);
    }
    .icon { font-size: 3rem; margin-bottom: 16px; }
    h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.03em;
         background: linear-gradient(135deg,#fff 20%,#b44eff 60%,#4f8bff 100%);
         -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    p { margin-top: 14px; font-size: 0.85rem; color: rgba(200,180,255,0.5); line-height: 1.7; }
    .pill { display: inline-block; margin-top: 20px; background: rgba(130,60,255,0.15);
            border: 1px solid rgba(150,100,255,0.25); border-radius: 99px;
            padding: 6px 18px; font-size: 0.75rem; color: rgba(200,180,255,0.6); }
    a { display: inline-block; margin-top: 28px;
        background: linear-gradient(135deg,#7c3aed,#b44eff 60%,#4f8bff);
        color: #fff; text-decoration: none; border-radius: 12px; padding: 13px 28px;
        font-size: 0.82rem; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎟</div>
    <h1>You're in the pool</h1>
    <p>Your subscription is confirmed. You've been entered into this Monday's draw
       with your 4 monthly entries + 5 signup bonus tickets.</p>
    <p>Check your inbox — a welcome email is on its way.</p>
    <div class="pill">🏆 Draw runs every Monday at 12:00 noon</div>
    <br>
    <a href="/">Back to QUID →</a>
  </div>
</body>
</html>
